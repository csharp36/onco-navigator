services:
  postgres:
    image: postgres:16
    container_name: onco-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      TEMPORAL_DB_PASSWORD: ${TEMPORAL_DB_PASSWORD}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.28.3
    container_name: onco-temporal
    ports:
      - "7233:7233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: onco-temporal-ui
    ports:
      - "8080:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    depends_on:
      - temporal
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: onco-keycloak
    command: start-dev --import-realm
    ports:
      - "9090:8080"
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # app service is defined for completeness but commented out for local development.
  # During active development, run the Spring Boot app directly via ./mvnw spring-boot:run
  # with SPRING_PROFILES_ACTIVE=local to avoid rebuilding the Docker image on each change.
  #
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: onco-app
  #   ports:
  #     - "8081:8081"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     keycloak:
  #       condition: service_started
  #     temporal:
  #       condition: service_started
  #   environment:
  #     SPRING_PROFILES_ACTIVE: local
  #     JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_MASTER_KEY}
  #   restart: unless-stopped

volumes:
  pgdata:
