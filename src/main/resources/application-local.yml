spring:
  jpa:
    hibernate:
      # Override 'validate' from shared config — let Envers auto-create _AUD tables locally.
      # Production should use a Flyway migration for the _AUD tables instead.
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://localhost:5432/onconavigator?stringtype=unspecified
    username: onco_app
    # For local dev, use plaintext password matching docker/init-db.sh.
    # Production uses AWS Secrets Manager (application-aws.yml).
    password: ${APP_DB_PASSWORD:localdev_app_password}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/onco-navigator

spring.temporal:
  connection:
    target: localhost:7233
  workers-auto-discovery:
    packages:
      - com.onconavigator.workflow
      - com.onconavigator.activity
  workers:
    - task-queue: onco-pathway-queue
      name: onco-pathway-worker
      activity-beans:
        - pathwayEvaluationActivityImpl
        - alertGenerationActivityImpl
        - sweepActivityImpl

onconavigator:
  encryption:
    # AES-256 key for PHI column encryption (Base64-encoded 32-byte key).
    # PLACEHOLDER — replace with a real key before running:
    #   openssl rand -base64 32
    # In production, inject from AWS Secrets Manager.
    # This is a non-secret placeholder; the actual key must never be committed.
    key: HqmsJAlCUqgAmHAsahP7Y4as/V5ChavBN2horjFffpw=

jasypt:
  encryptor:
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator
    # Master key injected at runtime via JASYPT_ENCRYPTOR_PASSWORD env var
    # Never set jasypt.encryptor.password directly in committed config files
