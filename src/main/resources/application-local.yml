spring:
  jpa:
    hibernate:
      # Override 'validate' from shared config — let Envers auto-create _AUD tables locally.
      # Production should use a Flyway migration for the _AUD tables instead.
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://localhost:5432/onconavigator?stringtype=unspecified
    username: onco_app
    # For local dev, use plaintext password matching docker/init-db.sh.
    # Production uses AWS Secrets Manager (application-aws.yml).
    password: ${APP_DB_PASSWORD:localdev_app_password}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-ant-placeholder}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 1024
          temperature: 0.1
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 1s
        multiplier: 2
        max-interval: 10s
      on-client-errors: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 22MB
  http:
    client:
      factory: jdk
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/onco-navigator

spring.temporal:
  connection:
    target: localhost:7233
  workers-auto-discovery:
    packages:
      - com.onconavigator.workflow
      - com.onconavigator.activity
  workers:
    - task-queue: onco-pathway-queue
      name: onco-pathway-worker
      activity-beans:
        - pathwayEvaluationActivityImpl
        - alertGenerationActivityImpl
        - sweepActivityImpl

onconavigator:
  encryption:
    # AES-256 key for PHI column encryption (Base64-encoded 32-byte key).
    # PLACEHOLDER — replace with a real key before running:
    #   openssl rand -base64 32
    # In production, inject from AWS Secrets Manager.
    # This is a non-secret placeholder; the actual key must never be committed.
    key: HqmsJAlCUqgAmHAsahP7Y4as/V5ChavBN2horjFffpw=
  hmac:
    # HMAC-SHA256 key for deterministic MRN index token (Base64-encoded 32-byte key).
    # MUST be different from the AES encryption key (per D-04 key separation).
    # Generate with: openssl rand -base64 32
    # In production, inject from AWS Secrets Manager.
    key: zGQKsAm4szIgA0tYoYZY8dPAPWkoUMUjXp5EM9Ifohc=
  ai:
    document-classification:
      enabled: false
  tessdata:
    path: /usr/share/tesseract-ocr/5/tessdata

resilience4j:
  circuitbreaker:
    instances:
      claude-api:
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true

management:
  health:
    circuitbreakers:
      enabled: true

jasypt:
  encryptor:
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator
    # Master key injected at runtime via JASYPT_ENCRYPTOR_PASSWORD env var
    # Never set jasypt.encryptor.password directly in committed config files
